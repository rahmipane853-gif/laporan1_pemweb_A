<!DOCTYPE html>
<html lang="id">
<head>
    <title>Lab ITPLN - Pendaftaran</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <header>
        <h1>Open Recruitment Asisten</h1>
        <nav>
            <a href="inventaris.html">Inventaris</a>
            <a href="stok.html">Stok Barang</a>
            <a href="pendaftaran.html" class="active">Pendaftaran</a>
            <a href="akun.html">Portal Akun</a>
        </nav>
    </header>

    <main>
        <form class="reg-form">
            <fieldset>
                <legend>Data Identitas Calon Asisten</legend>
                <div class="form-group">
                    <label>Nama Lengkap:</label>
                    <input type="text" placeholder="Sesuai KTM">
                </div>
                <div class="form-group">
                    <label>Minat Laboratorium:</label>
                    <select>
                        <option>Information Retrieval</option>
                        <option>Software Engineering</option>
                        <option>Intelligent Computing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bahasa Pemrograman:</label><br>
                    <input type="checkbox"> Python 
                    <input type="checkbox"> Java 
                    <input type="checkbox"> PHP
                </div>
                <div class="form-group">
                    <label>Visi & Misi:</label><br>
                    <textarea rows="5"></textarea>
                </div>
                <button type="submit">Kirim Aplikasi</button>
            </fieldset>
        </form>
    </main>
</body>
</html>
